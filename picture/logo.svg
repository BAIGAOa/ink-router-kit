<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"> 

<defs> 

<linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%"> 

<stop offset="0%" style="stop-color:#4cc9f0;stop-opacity:1" /> 

<stop offset="100%" style="stop-color:#7209b7;stop-opacity:1" /> 

</linearGradient> 

</defs> 

<!-- Root node (layer 1) --> 

<rect x="70" y="20" width="60" height="30" rx="4" fill="#4cc9f0"/> 

<circle cx="100" cy="50" r="3" fill="#00ff88"/> 

<!-- Connection line to layer 2 --> 

<line x1="100" y1="50" x2="100" y2="65" stroke="#00ff88" stroke-width="2"/> 

<!-- Layer 2 nodes --> 

<rect x="30" y="65" width="45" height="25" rx="3" fill="#4361ee"/> 

<circle cx="52" cy="90" r="3" fill="#00ff88"/> 

<rect x="77" y="65" width="45" height="25" rx="3" fill="#4361ee"/> 

<circle cx="100" cy="90" r="3" fill="#00ff88"/> 

<rect x="125" y="65" width="45" height="25" rx="3" fill="#4361ee"/> 

<circle cx="147" cy="90" r="3" fill="#00ff88"/> 

<!-- Connection lines to layer 3 --> 

<line x1="52" y1="90" x2="52" y2="105" stroke="#00ff88" stroke-width="2"/> 

<line x1="100" y1="90" x2="100" y2="105" stroke="#00ff88" stroke-width="2"/> 

<!-- Layer 3 nodes --> 

<rect x="35" y="105" width="35" height="22" rx="3" fill="#3a0ca3"/> 

<circle cx="52" cy="127" r="3" fill="#00ff88"/> 

<rect x="82" y="105" width="35" height="22" rx="3" fill="#3a0ca3"/> 

<circle cx="100" cy="127" r="3" fill="#00ff88"/> 

<!-- Connection line to layer 4 --> 

<line x1="52" y1="127" x2="52" y2="142" stroke="#00ff88" stroke-width="2"/> 

<!-- Layer 4 (leaf) node --> 

<rect x="40" y="142" width="25" height="18" rx="2" fill="#7209b7"/> 

<circle cx="52" cy="160" r="2" fill="#00ff88"/> 

<!-- Active path highlight (from root to leaf) --> 

<line x1="100" y1="50" x2="100" y2="65" stroke="#00ff88" stroke-width="3" opacity="0.6"/> 

<line x1="100" y1="90" x2="52" y2="90" stroke="#00ff88" stroke-width="3" opacity="0.6"/> 

<line x1="52" y1="90" x2="52" y2="105" stroke="#00ff88" stroke-width="3" opacity="0.6"/> 

<line x1="52" y1="127" x2="52" y2="142" stroke="#00ff88" stroke-width="3" opacity="0.6"/> 

</svg>
